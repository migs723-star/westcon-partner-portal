<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Westcon Knowledge Base</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(135deg,#0f172a 0%,#111827 45%,#083344 100%);
      color: #e5eef7;
    }

    .page-wrap {
      max-width: 1400px;
      margin: auto;
      padding: 28px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 22px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      margin-bottom: 24px;
    }

    .top-btn {
      padding: 10px 16px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      cursor: pointer;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 400px 1fr;
      gap: 24px;
    }

    .panel {
      background: rgba(255,255,255,0.06);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .info-panel {
      padding: 24px;
    }

    .chat-panel {
      display: flex;
      flex-direction: column;
      height: 420px;
    }

    .chat-header {
      padding: 18px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      max-width: 75%;
    }

    .user {
      align-self: flex-end;
      background: #155e75;
    }

    .bot {
      align-self: flex-start;
      background: rgba(255,255,255,0.08);
    }

    .chat-input-wrap {
      padding: 16px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .input-shell {
      display: flex;
      gap: 10px;
    }

    textarea {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      resize: none;
      outline: none;
    }

    .send-btn {
      width: 50px;
      border-radius: 10px;
      background: #0891b2;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="page-wrap">

  <div class="topbar">
    <h2>Westcon Knowledge Base</h2>
    <div>
      <button class="top-btn" onclick="location.href='userdashboard.html'">Back</button>
      <button class="top-btn" onclick="clearChat()">Clear</button>
    </div>
  </div>

  <div class="main-grid">

    <!-- LEFT INFO -->
    <div class="panel info-panel">
      <h2>Get fast answers</h2>
      <p>This AI assistant helps you query the Westcon knowledge base instantly.</p>
    </div>

    <!-- CHAT -->
    <div class="panel chat-panel">

      <div class="chat-header">
        <strong>Westcon KB Chatbot</strong>
      </div>

      <div id="chatMessages" class="chat-messages">
        <div class="bubble bot">Ask me anything about Westcon services.</div>
      </div>

      <div class="chat-input-wrap">
        <div class="input-shell">
          <textarea id="chatInput" placeholder="Type your question..."></textarea>
          <button class="send-btn" onclick="sendMessage()">→</button>
        </div>
      </div>

    </div>

  </div>

</div>

<script>

const WEBHOOK_URL = "https://newgenit.app.n8n.cloud/webhook/916e36ec-a45c-454a-bd9b-8cb7605ef3fb/chat";

const chatMessages = document.getElementById("chatMessages");
const chatInput = document.getElementById("chatInput");

function addMessage(text, sender) {
  const div = document.createElement("div");
  div.className = "bubble " + sender;
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function clearChat() {
  chatMessages.innerHTML = `<div class="bubble bot">Ask me anything about Westcon services.</div>`;
}

async function sendMessage() {
  const message = chatInput.value.trim();
  if (!message) return;

  addMessage(message, "user");
  chatInput.value = "";

  try {
    const response = await fetch(WEBHOOK_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: message
      })
    });

    const data = await response.json();

    const reply = data.response || data.output || "No response from AI";

    addMessage(reply, "bot");

  } catch (err) {
    addMessage("Error connecting to AI service.", "bot");
    console.error(err);
  }
}

</script>

</body>
</html>

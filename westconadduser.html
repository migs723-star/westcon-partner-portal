<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add New Partner User</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(135deg, #08132b 0%, #050b16 48%, #03243a 100%);
      color: #ffffff;
      min-height: 100vh;
    }

    .page-wrap {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 28px 50px;
    }

    .page-title {
      font-size: 58px;
      font-weight: 800;
      margin: 0 0 34px;
      letter-spacing: -0.03em;
    }

    .form-shell {
      background: linear-gradient(90deg, rgba(27, 42, 88, 0.95) 0%, rgba(12, 16, 24, 0.97) 50%, rgba(5, 42, 56, 0.96) 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 46px 48px 42px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.25);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 230px 1fr;
      gap: 30px 28px;
      align-items: center;
    }

    .label {
      font-size: 25px;
      font-weight: 700;
      line-height: 1.25;
      color: #ffffff;
    }

    .input {
      width: 100%;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #dfe5ef;
      color: #101826;
      font-size: 20px;
      padding: 20px 22px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .input::placeholder {
      color: #7a8394;
    }

    .input:focus {
      border-color: rgba(70, 140, 255, 0.7);
      box-shadow: 0 0 0 3px rgba(70, 140, 255, 0.18);
    }

    .readonly-dark {
      background: rgba(2, 8, 22, 0.92);
      color: #d7e2f8;
      font-weight: 700;
    }

    .services-box {
      background: rgba(0, 4, 14, 0.78);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 26px;
      padding: 22px 20px;
    }

    .service-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      background: linear-gradient(90deg, rgba(7, 15, 35, 0.95) 0%, rgba(4, 10, 24, 0.95) 100%);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 18px;
      padding: 18px 22px;
      margin-bottom: 16px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    .service-option:last-child {
      margin-bottom: 0;
    }

    .service-option:hover {
      transform: translateY(-1px);
      background: linear-gradient(90deg, rgba(10, 20, 45, 0.98) 0%, rgba(6, 12, 28, 0.98) 100%);
      border-color: rgba(255,255,255,0.08);
    }

    .service-left {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .service-option input[type="checkbox"] {
      width: 26px;
      height: 26px;
      accent-color: #3d8bfd;
      flex-shrink: 0;
      cursor: pointer;
    }

    .service-name {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.3;
    }

    .service-price {
      font-size: 20px;
      font-weight: 800;
      color: #ffffff;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .value-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 60px;
    }

    .value-big {
      font-size: 38px;
      font-weight: 800;
      color: #ffffff;
      text-align: right;
    }

    .button-row {
      margin-top: 28px;
      display: flex;
      gap: 18px;
      align-items: center;
    }

    .btn {
      border: none;
      border-radius: 20px;
      padding: 18px 30px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      min-width: 200px;
      color: #ffffff;
      background: linear-gradient(135deg, #3e8cff 0%, #2f7df0 100%);
      box-shadow: 0 12px 26px rgba(47, 125, 240, 0.24);
    }

    .btn-secondary {
      color: #ffffff;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.06);
      min-width: 140px;
    }

    .status {
      margin-top: 18px;
      min-height: 28px;
      font-size: 15px;
      font-weight: 700;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .status.info { color: #9fc2ff; }
    .status.success { color: #7df0a6; }
    .status.error { color: #ff8f8f; }

    @media (max-width: 980px) {
      .page-title {
        font-size: 40px;
      }

      .form-shell {
        padding: 28px 22px;
      }

      .form-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .label {
        font-size: 20px;
      }

      .service-name,
      .service-price,
      .input {
        font-size: 17px;
      }

      .value-big {
        font-size: 30px;
        text-align: left;
      }

      .button-row {
        flex-direction: column;
        align-items: stretch;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <h1 class="page-title">Add New Partner User</h1>

    <div class="form-shell">
      <form id="addUserForm">
        <div class="form-grid">
          <div class="label">User<br>ID</div>
          <div>
            <input
              type="text"
              id="userId"
              class="input readonly-dark"
              readonly
              placeholder="Loading next user ID..."
            />
          </div>

          <div class="label">Username (Login Email)</div>
          <div>
            <input
              type="email"
              id="username"
              class="input"
              placeholder="Enter login email"
              required
            />
          </div>

          <div class="label">Company</div>
          <div>
            <input
              type="text"
              id="company"
              class="input"
              placeholder="Enter company name"
              required
            />
          </div>

          <div class="label">Services<br>Purchased</div>
          <div>
            <div class="services-box">
              <label class="service-option">
                <div class="service-left">
                  <input type="checkbox" value="Westcon Knowledge Base" data-price="49" />
                  <div class="service-name">Westcon Knowledge Base</div>
                </div>
                <div class="service-price">$49</div>
              </label>

              <label class="service-option">
                <div class="service-left">
                  <input type="checkbox" value="AI Sales Copilot for Resellers" data-price="178" />
                  <div class="service-name">AI Sales Copilot for Resellers</div>
                </div>
                <div class="service-price">$178</div>
              </label>

              <label class="service-option">
                <div class="service-left">
                  <input type="checkbox" value="AI Network Architecture Recommendations" data-price="289" />
                  <div class="service-name">AI Network Architecture Recommendations</div>
                </div>
                <div class="service-price">$289</div>
              </label>
            </div>
          </div>

          <div class="label">Billing Date</div>
          <div>
            <input type="date" id="billingDate" class="input" required />
          </div>

          <div class="label">Monthly Cost</div>
          <div class="value-row">
            <div></div>
            <div class="value-big" id="monthlyCost">$0</div>
          </div>

          <div class="label">Tokens Purchased</div>
          <div class="value-row">
            <div></div>
            <div class="value-big" id="tokensPurchased">0</div>
          </div>
        </div>

        <div class="button-row">
          <button type="submit" class="btn btn-primary" id="createUserBtn">Create User</button>
          <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
        </div>

        <div id="statusMessage" class="status info"></div>
      </form>
    </div>
  </div>

  <script>
    /*************************************************
     * CONFIG - REPLACE THESE VALUES
     *************************************************/
    const AIRTABLE_PAT = "YOUR_AIRTABLE_PAT_HERE";
    const AIRTABLE_BASE_ID = "YOUR_AIRTABLE_BASE_ID_HERE";

    /*
      IMPORTANT:
      If you still get NOT_FOUND, double check the exact Airtable tab name.
      Try WestConAdmin, WestconAdmin, or whatever the tab is named exactly.
    */
    const AIRTABLE_TABLE_NAME = "WestConAdmin";

    // Add your n8n webhook later
    const N8N_WEBHOOK_URL = "";

    /*************************************************
     * FIELD NAMES - MUST MATCH AIRTABLE COLUMN NAMES
     *************************************************/
    const FIELD_NAMES = {
      userId: "User ID",
      username: "Username",
      company: "Company",
      servicesPurchased: "Services Purchased",
      monthlyCost: "Monthly Cost",
      billingDate: "Billing Date",
      tokensPurchased: "Tokens Purchased"
    };

    const form = document.getElementById("addUserForm");
    const userIdInput = document.getElementById("userId");
    const usernameInput = document.getElementById("username");
    const companyInput = document.getElementById("company");
    const billingDateInput = document.getElementById("billingDate");
    const monthlyCostEl = document.getElementById("monthlyCost");
    const tokensPurchasedEl = document.getElementById("tokensPurchased");
    const createUserBtn = document.getElementById("createUserBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const statusMessage = document.getElementById("statusMessage");
    const serviceCheckboxes = document.querySelectorAll('.services-box input[type="checkbox"]');

    function setStatus(message, type = "info") {
      statusMessage.textContent = message;
      statusMessage.className = `status ${type}`;
    }

    function formatDateForInput(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function getSelectedServices() {
      return Array.from(serviceCheckboxes)
        .filter(cb => cb.checked)
        .map(cb => ({
          name: cb.value,
          price: Number(cb.dataset.price || 0)
        }));
    }

    function updateComputedValues() {
      const selectedServices = getSelectedServices();
      const monthlyCost = selectedServices.reduce((sum, service) => sum + service.price, 0);
      const tokensPurchased = selectedServices.length * 100000;

      monthlyCostEl.textContent = `$${monthlyCost}`;
      tokensPurchasedEl.textContent = String(tokensPurchased);

      return {
        monthlyCost,
        tokensPurchased
      };
    }

    function normaliseUserId(value) {
      if (value === null || value === undefined || value === "") return 0;
      if (typeof value === "number") return value;

      const matches = String(value).match(/\d+/g);
      if (!matches || !matches.length) return 0;

      return Number(matches.join(""));
    }

    async function fetchNextUserId() {
      const endpoint = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE_NAME)}?pageSize=100`;

      let offset = null;
      let maxUserId = 0;

      do {
        const url = offset
          ? `${endpoint}&offset=${encodeURIComponent(offset)}`
          : endpoint;

        const response = await fetch(url, {
          method: "GET",
          headers: {
            "Authorization": `Bearer ${AIRTABLE_PAT}`,
            "Content-Type": "application/json"
          }
        });

        const rawText = await response.text();

        if (!response.ok) {
          throw new Error(rawText);
        }

        const data = JSON.parse(rawText);

        if (Array.isArray(data.records)) {
          data.records.forEach(record => {
            const rawUserId = record.fields?.[FIELD_NAMES.userId];
            const numericUserId = normaliseUserId(rawUserId);
            if (numericUserId > maxUserId) {
              maxUserId = numericUserId;
            }
          });
        }

        offset = data.offset || null;
      } while (offset);

      return maxUserId + 1;
    }

    async function createAirtableRecord(payload) {
      const endpoint = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE_NAME)}`;

      const body = {
        fields: {
          [FIELD_NAMES.userId]: payload.userId,
          [FIELD_NAMES.username]: payload.username,
          [FIELD_NAMES.company]: payload.company,
          [FIELD_NAMES.servicesPurchased]: payload.servicesPurchased,
          [FIELD_NAMES.monthlyCost]: payload.monthlyCost,
          [FIELD_NAMES.billingDate]: payload.billingDate,
          [FIELD_NAMES.tokensPurchased]: payload.tokensPurchased
        }
      };

      const response = await fetch(endpoint, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${AIRTABLE_PAT}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      });

      const rawText = await response.text();

      if (!response.ok) {
        throw new Error(rawText);
      }

      return JSON.parse(rawText);
    }

    async function sendToN8NWebhook(payload) {
      if (!N8N_WEBHOOK_URL.trim()) {
        return null;
      }

      const response = await fetch(N8N_WEBHOOK_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const rawText = await response.text();

      if (!response.ok) {
        throw new Error(rawText);
      }

      try {
        return JSON.parse(rawText);
      } catch {
        return rawText;
      }
    }

    async function initialiseForm() {
      try {
        setStatus("Loading next user ID...", "info");

        const today = new Date();
        billingDateInput.value = formatDateForInput(today);

        const nextUserId = await fetchNextUserId();
        userIdInput.value = nextUserId;

        updateComputedValues();
        setStatus("Form ready.", "success");
      } catch (error) {
        console.error("Airtable load error:", error);
        userIdInput.value = "";
        setStatus(
          `Could not load next User ID: ${error.message}

Check these exactly:
1. AIRTABLE_BASE_ID starts with app...
2. AIRTABLE_PAT starts with pat...
3. AIRTABLE_TABLE_NAME matches the Airtable tab name exactly`,
          "error"
        );
      }
    }

    serviceCheckboxes.forEach(cb => {
      cb.addEventListener("change", updateComputedValues);
    });

    cancelBtn.addEventListener("click", () => {
      window.location.href = "westconAdmin.html";
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const userId = userIdInput.value.trim();
      const username = usernameInput.value.trim();
      const company = companyInput.value.trim();
      const billingDate = billingDateInput.value;
      const selectedServices = getSelectedServices();
      const computed = updateComputedValues();

      if (!userId) {
        setStatus("User ID is missing. Please check Airtable settings.", "error");
        return;
      }

      if (!username) {
        setStatus("Please enter the login email.", "error");
        return;
      }

      if (!company) {
        setStatus("Please enter the company name.", "error");
        return;
      }

      if (!selectedServices.length) {
        setStatus("Please select at least one service.", "error");
        return;
      }

      if (!billingDate) {
        setStatus("Please choose a billing date.", "error");
        return;
      }

      const payload = {
        userId: Number(userId),
        username,
        company,
        servicesPurchased: selectedServices.map(service => service.name),
        monthlyCost: computed.monthlyCost,
        tokensPurchased: computed.tokensPurchased,
        billingDate,
        createdAt: new Date().toISOString()
      };

      try {
        createUserBtn.disabled = true;
        createUserBtn.textContent = "Creating...";
        setStatus("Creating user in Airtable...", "info");

        const airtableResult = await createAirtableRecord(payload);

        try {
          await sendToN8NWebhook({
            source: "westconadduser.html",
            action: "create_user",
            airtableRecordId: airtableResult.id,
            ...payload
          });
        } catch (webhookError) {
          console.warn("n8n webhook error:", webhookError);
        }

        setStatus("User created successfully. Redirecting...", "success");

        setTimeout(() => {
          window.location.href = "westconAdmin.html";
        }, 1000);
      } catch (error) {
        console.error("Create user error:", error);
        setStatus(`Failed to create user: ${error.message}`, "error");
      } finally {
        createUserBtn.disabled = false;
        createUserBtn.textContent = "Create User";
      }
    });

    initialiseForm();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add New Partner User</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,Arial,sans-serif;
background:linear-gradient(135deg,#08132b 0%,#050b16 48%,#03243a 100%);
color:#fff;
min-height:100vh;
}

.page-wrap{
width:100%;
max-width:1400px;
margin:auto;
padding:30px;
}

.page-title{
font-size:56px;
font-weight:800;
margin-bottom:35px;
}

.form-shell{
background:linear-gradient(90deg,rgba(27,42,88,.95) 0%,rgba(12,16,24,.97) 50%,rgba(5,42,56,.96) 100%);
border:1px solid rgba(255,255,255,.08);
border-radius:26px;
padding:45px;
}

.form-grid{
display:grid;
grid-template-columns:230px 1fr;
gap:30px;
align-items:center;
}

.label{
font-size:24px;
font-weight:700;
}

.input{
width:100%;
border-radius:20px;
border:1px solid rgba(255,255,255,.08);
background:#dfe5ef;
color:#101826;
font-size:18px;
padding:18px;
}

.services-box{
background:#000814;
border-radius:20px;
padding:20px;
}

.service-option{
display:flex;
justify-content:space-between;
align-items:center;
background:#010d2b;
padding:18px;
border-radius:16px;
margin-bottom:12px;
}

.service-left{
display:flex;
gap:14px;
align-items:center;
}

.service-option input{
width:22px;
height:22px;
}

.value-big{
font-size:36px;
font-weight:800;
}

.button-row{
margin-top:30px;
display:flex;
gap:16px;
}

.btn{
border:none;
padding:16px 28px;
border-radius:18px;
font-size:18px;
font-weight:700;
cursor:pointer;
}

.btn-primary{
background:linear-gradient(135deg,#3e8cff,#2f7df0);
color:white;
}

.btn-secondary{
background:rgba(255,255,255,.08);
color:white;
}

.status{
margin-top:20px;
font-size:14px;
font-weight:700;
}

</style>
</head>

<body>

<div class="page-wrap">

<h1 class="page-title">Add New Partner User</h1>

<div class="form-shell">

<form id="addUserForm">

<div class="form-grid">

<div class="label">User ID</div>
<div>
<input id="userId" class="input" placeholder="Enter User ID e.g West01-00012" required>
</div>

<div class="label">Username (Login Email)</div>
<div>
<input id="username" class="input" placeholder="Enter login email" required>
</div>

<div class="label">Company</div>
<div>
<input id="company" class="input" placeholder="Enter company name" required>
</div>

<div class="label">Services Purchased</div>

<div>

<div class="services-box">

<label class="service-option">
<div class="service-left">
<input type="checkbox" value="Westcon Knowledge Base" data-price="49">
<div>Westcon Knowledge Base</div>
</div>
<div>$49</div>
</label>

<label class="service-option">
<div class="service-left">
<input type="checkbox" value="AI Sales Copilot for Resellers" data-price="178">
<div>AI Sales Copilot for Resellers</div>
</div>
<div>$178</div>
</label>

<label class="service-option">
<div class="service-left">
<input type="checkbox" value="AI Network Architecture Recommendations" data-price="289">
<div>AI Network Architecture Recommendations</div>
</div>
<div>$289</div>
</label>

</div>

</div>

<div class="label">Billing Date</div>
<div>
<input type="date" id="billingDate" class="input">
</div>

<div class="label">Monthly Cost</div>
<div class="value-big" id="monthlyCost">$0</div>

<div class="label">Tokens Purchased</div>
<div class="value-big" id="tokensPurchased">0</div>

</div>

<div class="button-row">
<button type="submit" class="btn btn-primary">Create User</button>
<button type="button" class="btn btn-secondary" onclick="window.location.href='westconAdmin.html'">Cancel</button>
</div>

<div id="statusMessage" class="status"></div>

</form>

</div>
</div>


<script>

/*************************************************
CONFIG
*************************************************/

const AIRTABLE_PAT = "YOUR_PAT";
const AIRTABLE_BASE_ID = "YOUR_BASE_ID";
const AIRTABLE_TABLE = "WestConAdmin";

const N8N_WEBHOOK = ""; // add later if needed


/*************************************************
FIELDS (MUST MATCH AIRTABLE)
*************************************************/

const FIELD_NAMES = {

userId:"User ID",
username:"Username",
company:"Company",
services:"Services Purchased",
monthlyCost:"Monthly Cost",
billingDate:"Billing Date",
tokens:"Tokens Purchased"

};


/*************************************************
DEFAULT BILLING DATE
*************************************************/

document.getElementById("billingDate").value =
new Date().toISOString().split("T")[0];


/*************************************************
SERVICE CALCULATIONS
*************************************************/

const checkboxes = document.querySelectorAll('input[type="checkbox"]');

function updateValues(){

let cost=0;
let count=0;

checkboxes.forEach(cb=>{
if(cb.checked){
cost+=Number(cb.dataset.price);
count++;
}
});

document.getElementById("monthlyCost").innerText="$"+cost;
document.getElementById("tokensPurchased").innerText=count*100000;

return{
monthlyCost:cost,
tokens:count*100000
}

}

checkboxes.forEach(cb=>{
cb.addEventListener("change",updateValues);
});


/*************************************************
CREATE USER
*************************************************/

document.getElementById("addUserForm").addEventListener("submit",async(e)=>{

e.preventDefault();

const userId=document.getElementById("userId").value;
const username=document.getElementById("username").value;
const company=document.getElementById("company").value;
const billingDate=document.getElementById("billingDate").value;

const values=updateValues();

const services=[];

checkboxes.forEach(cb=>{
if(cb.checked) services.push(cb.value);
});

const payload={
userId,
username,
company,
services,
monthlyCost:values.monthlyCost,
tokensPurchased:values.tokens,
billingDate
};


try{

document.getElementById("statusMessage").innerText="Creating user...";


/*************************************************
AIRTABLE INSERT
*************************************************/

const response=await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${AIRTABLE_TABLE}`,{

method:"POST",
headers:{
"Authorization":`Bearer ${AIRTABLE_PAT}`,
"Content-Type":"application/json"
},

body:JSON.stringify({
fields:{
[FIELD_NAMES.userId]:payload.userId,
[FIELD_NAMES.username]:payload.username,
[FIELD_NAMES.company]:payload.company,
[FIELD_NAMES.services]:payload.services,
[FIELD_NAMES.monthlyCost]:payload.monthlyCost,
[FIELD_NAMES.billingDate]:payload.billingDate,
[FIELD_NAMES.tokens]:payload.tokensPurchased
}
})

});


if(!response.ok){
throw new Error(await response.text());
}


/*************************************************
OPTIONAL N8N WEBHOOK
*************************************************/

if(N8N_WEBHOOK){

await fetch(N8N_WEBHOOK,{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify(payload)
});

}


document.getElementById("statusMessage").innerText="User created successfully";

setTimeout(()=>{
window.location.href="westconAdmin.html";
},1000);

}

catch(err){

console.error(err);

document.getElementById("statusMessage").innerText=
"Error creating user: "+err.message;

}

});


</script>

</body>
</html>

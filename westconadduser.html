<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add New Partner User</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(135deg, #08132b 0%, #050b16 48%, #03243a 100%);
      color: #ffffff;
      min-height: 100vh;
    }

    .page-wrap {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 28px 50px;
    }

    .page-title {
      font-size: 58px;
      font-weight: 800;
      margin: 0 0 34px;
      letter-spacing: -0.03em;
    }

    .form-shell {
      background: linear-gradient(90deg, rgba(27, 42, 88, 0.95) 0%, rgba(12, 16, 24, 0.97) 50%, rgba(5, 42, 56, 0.96) 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 46px 48px 42px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.25);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 230px 1fr;
      gap: 30px 28px;
      align-items: center;
    }

    .label {
      font-size: 25px;
      font-weight: 700;
      line-height: 1.25;
      color: #ffffff;
    }

    .input {
      width: 100%;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #dfe5ef;
      color: #101826;
      font-size: 20px;
      padding: 20px 22px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .input::placeholder {
      color: #7a8394;
    }

    .input:focus {
      border-color: rgba(70, 140, 255, 0.7);
      box-shadow: 0 0 0 3px rgba(70, 140, 255, 0.18);
    }

    .services-box {
      background: rgba(0, 4, 14, 0.78);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 26px;
      padding: 22px 20px;
    }

    .service-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      background: linear-gradient(90deg, rgba(7, 15, 35, 0.95) 0%, rgba(4, 10, 24, 0.95) 100%);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 18px;
      padding: 18px 22px;
      margin-bottom: 16px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    .service-option:last-child {
      margin-bottom: 0;
    }

    .service-option:hover {
      transform: translateY(-1px);
      background: linear-gradient(90deg, rgba(10, 20, 45, 0.98) 0%, rgba(6, 12, 28, 0.98) 100%);
      border-color: rgba(255,255,255,0.08);
    }

    .service-left {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .service-option input[type="checkbox"] {
      width: 26px;
      height: 26px;
      accent-color: #3d8bfd;
      flex-shrink: 0;
      cursor: pointer;
    }

    .service-name {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.3;
    }

    .service-price {
      font-size: 20px;
      font-weight: 800;
      color: #ffffff;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .value-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 60px;
    }

    .value-big {
      font-size: 38px;
      font-weight: 800;
      color: #ffffff;
      text-align: right;
    }

    .button-row {
      margin-top: 28px;
      display: flex;
      gap: 18px;
      align-items: center;
    }

    .btn {
      border: none;
      border-radius: 20px;
      padding: 18px 30px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      min-width: 200px;
      color: #ffffff;
      background: linear-gradient(135deg, #3e8cff 0%, #2f7df0 100%);
      box-shadow: 0 12px 26px rgba(47, 125, 240, 0.24);
    }

    .btn-secondary {
      color: #ffffff;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.06);
      min-width: 140px;
    }

    .status {
      margin-top: 18px;
      min-height: 28px;
      font-size: 15px;
      font-weight: 700;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .status.info { color: #9fc2ff; }
    .status.success { color: #7df0a6; }
    .status.error { color: #ff8f8f; }

    @media (max-width: 980px) {
      .page-title {
        font-size: 40px;
      }

      .form-shell {
        padding: 28px 22px;
      }

      .form-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .label {
        font-size: 20px;
      }

      .service-name,
      .service-price,
      .input {
        font-size: 17px;
      }

      .value-big {
        font-size: 30px;
        text-align: left;
      }

      .button-row {
        flex-direction: column;
        align-items: stretch;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <h1 class="page-title">Add New Partner User</h1>

    <div class="form-shell">
      <form id="addUserForm">
        <div class="form-grid">
          <div class="label">User ID</div>
          <div>
            <input
              type="text"
              id="userId"
              class="input"
              placeholder="Enter User ID e.g. West01-00012"
              required
            />
          </div>

          <div class="label">Row ID</div>
          <div>
            <input
              type="number"
              id="rowId"
              class="input"
              placeholder="Enter Row ID e.g. 12"
              required
            />
          </div>

          <div class="label">Username (Login Email)</div>
          <div>
            <input
              type="email"
              id="username"
              class="input"
              placeholder="Enter login email"
              required
            />
          </div>

          <div class="label">Company</div>
          <div>
            <input
              type="text"
              id="company"
              class="input"
              placeholder="Enter company name"
              required
            />
          </div>

          <div class="label">Services<br>Purchased</div>
          <div>
            <div class="services-box">
              <label class="service-option">
                <div class="service-left">
                  <input type="checkbox" value="Westcon Knowledge Base" data-price="49" />
                  <div class="service-name">Westcon Knowledge Base</div>
                </div>
                <div class="service-price">$49</div>
              </label>

              <label class="service-option">
                <div class="service-left">
                  <input type="checkbox" value="AI Sales Copilot for Resellers" data-price="178" />
                  <div class="service-name">AI Sales Copilot for Resellers</div>
                </div>
                <div class="service-price">$178</div>
              </label>

              <label class="service-option">
                <div class="service-left">
                  <input type="checkbox" value="AI Network Architecture Recommendations" data-price="289" />
                  <div class="service-name">AI Network Architecture Recommendations</div>
                </div>
                <div class="service-price">$289</div>
              </label>
            </div>
          </div>

          <div class="label">Billing Date</div>
          <div>
            <input type="date" id="billingDate" class="input" required />
          </div>

          <div class="label">Monthly Cost</div>
          <div class="value-row">
            <div></div>
            <div class="value-big" id="monthlyCost">$0</div>
          </div>

          <div class="label">Tokens Purchased</div>
          <div class="value-row">
            <div></div>
            <div class="value-big" id="tokensPurchased">0</div>
          </div>
        </div>

        <div class="button-row">
          <button type="submit" class="btn btn-primary" id="createUserBtn">Create User</button>
          <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
        </div>

        <div id="statusMessage" class="status info"></div>
      </form>
    </div>
  </div>

  <script>
    /*************************************************
     * CONFIG
     * Paste your PAT below, then rotate it afterwards.
     *************************************************/
    const AIRTABLE_PAT = "PASTE_YOUR_PAT_HERE";
    const AIRTABLE_BASE_ID = "appSD8RW451qfUbo2";
    const AIRTABLE_TABLE_NAME = "WestConAdmin";

    // Optional n8n webhook
    const N8N_WEBHOOK_URL = "";

    /*************************************************
     * FIELD NAMES
     *************************************************/
    const FIELD_NAMES = {
      userId: "User ID",
      rowId: "Row ID",
      username: "Username",
      company: "Company",
      servicesPurchased: "Services Purchased",
      tokensPurchased: "Tokens Purchased",
      tokenUsage: "Token Usage",
      tokensLeft: "Tokens Left",

      // IMPORTANT:
      // Replace this with the exact Airtable field name if needed.
      // Your screenshot shows "Next Payment..." but the full label is cut off.
      nextPayment: "Next Payment"
    };

    const form = document.getElementById("addUserForm");
    const userIdInput = document.getElementById("userId");
    const rowIdInput = document.getElementById("rowId");
    const usernameInput = document.getElementById("username");
    const companyInput = document.getElementById("company");
    const billingDateInput = document.getElementById("billingDate");
    const monthlyCostEl = document.getElementById("monthlyCost");
    const tokensPurchasedEl = document.getElementById("tokensPurchased");
    const createUserBtn = document.getElementById("createUserBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const statusMessage = document.getElementById("statusMessage");
    const serviceCheckboxes = document.querySelectorAll('.services-box input[type="checkbox"]');

    function setStatus(message, type = "info") {
      statusMessage.textContent = message;
      statusMessage.className = `status ${type}`;
    }

    function formatDateForInput(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function getSelectedServices() {
      return Array.from(serviceCheckboxes)
        .filter(cb => cb.checked)
        .map(cb => ({
          name: cb.value,
          price: Number(cb.dataset.price || 0)
        }));
    }

    function updateComputedValues() {
      const selectedServices = getSelectedServices();
      const monthlyCost = selectedServices.reduce((sum, service) => sum + service.price, 0);
      const tokensPurchased = selectedServices.length * 100000;

      monthlyCostEl.textContent = `$${monthlyCost}`;
      tokensPurchasedEl.textContent = String(tokensPurchased);

      return {
        monthlyCost,
        tokensPurchased,
        servicesAsText: selectedServices.map(service => service.name).join(", ")
      };
    }

    async function createAirtableRecord(payload) {
      const endpoint = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE_NAME)}`;

      const fields = {
        [FIELD_NAMES.userId]: payload.userId,
        [FIELD_NAMES.rowId]: payload.rowId,
        [FIELD_NAMES.username]: payload.username,
        [FIELD_NAMES.company]: payload.company,
        [FIELD_NAMES.servicesPurchased]: payload.servicesPurchased,
        [FIELD_NAMES.tokensPurchased]: payload.tokensPurchased,
        [FIELD_NAMES.tokenUsage]: 0,
        [FIELD_NAMES.tokensLeft]: payload.tokensPurchased
      };

      if (FIELD_NAMES.nextPayment && payload.billingDate) {
        fields[FIELD_NAMES.nextPayment] = payload.billingDate;
      }

      const response = await fetch(endpoint, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${AIRTABLE_PAT}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ fields })
      });

      const rawText = await response.text();
      console.log("Airtable raw response:", rawText);

      if (!response.ok) {
        throw new Error(rawText);
      }

      return JSON.parse(rawText);
    }

    async function sendToN8NWebhook(payload) {
      if (!N8N_WEBHOOK_URL.trim()) {
        return null;
      }

      const response = await fetch(N8N_WEBHOOK_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const rawText = await response.text();

      if (!response.ok) {
        throw new Error(rawText);
      }

      try {
        return JSON.parse(rawText);
      } catch {
        return rawText;
      }
    }

    serviceCheckboxes.forEach(cb => {
      cb.addEventListener("change", updateComputedValues);
    });

    cancelBtn.addEventListener("click", () => {
      window.location.href = "westconAdmin.html";
    });

    billingDateInput.value = formatDateForInput(new Date());
    updateComputedValues();

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const computed = updateComputedValues();

      const payload = {
        userId: userIdInput.value.trim(),
        rowId: Number(rowIdInput.value),
        username: usernameInput.value.trim(),
        company: companyInput.value.trim(),
        servicesPurchased: computed.servicesAsText,
        monthlyCost: computed.monthlyCost,
        tokensPurchased: computed.tokensPurchased,
        billingDate: billingDateInput.value,
        createdAt: new Date().toISOString()
      };

      if (!payload.userId) {
        setStatus("Please enter a User ID.", "error");
        return;
      }

      if (!payload.rowId || Number.isNaN(payload.rowId)) {
        setStatus("Please enter a valid Row ID.", "error");
        return;
      }

      if (!payload.username) {
        setStatus("Please enter the login email.", "error");
        return;
      }

      if (!payload.company) {
        setStatus("Please enter the company name.", "error");
        return;
      }

      if (!payload.servicesPurchased) {
        setStatus("Please select at least one service.", "error");
        return;
      }

      if (!payload.billingDate) {
        setStatus("Please choose a billing date.", "error");
        return;
      }

      try {
        createUserBtn.disabled = true;
        createUserBtn.textContent = "Creating...";
        setStatus("Creating user in Airtable...", "info");

        const airtableResult = await createAirtableRecord(payload);

        try {
          await sendToN8NWebhook({
            source: "westconadduser.html",
            action: "create_user",
            airtableRecordId: airtableResult.id,
            ...payload
          });
        } catch (webhookError) {
          console.warn("n8n webhook error:", webhookError);
        }

        setStatus("User created successfully. Redirecting...", "success");

        setTimeout(() => {
          window.location.href = "westconAdmin.html";
        }, 1000);
      } catch (error) {
        console.error("Create user error:", error);
        setStatus(`Failed to create user: ${error.message}`, "error");
      } finally {
        createUserBtn.disabled = false;
        createUserBtn.textContent = "Create User";
      }
    });
  </script>
</body>
</html>
